name: 仅同步 gh-pages 分支更新
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync-gh-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/jaywcjlove/reference.git

      - name: Fetch upstream gh-pages
        run: git fetch upstream gh-pages

      - name: Merge upstream gh-pages
        run: git merge upstream/gh-pages --no-edit

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          branch: gh-pages
