name: Sync upstream
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream
        run: git remote add upstream https://github.com/jaywcjlove/reference.git

      - name: Fetch & merge
        run: |
          git fetch upstream
          git checkout main
          git merge upstream/main
          git checkout gh-pages
          git merge upstream/gh-pages

      - name: Push
        uses: ad-m/github-push-action@master
        with:
          branch: gh-pages
