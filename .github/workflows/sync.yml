name: 同步上游 gh-pages

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout 自己的 gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 Git
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"

      - name: 添加上游仓库
        run: git remote add upstream https://github.com/jaywcjlove/reference.git

      - name: 拉取上游 gh-pages
        run: git fetch upstream gh-pages

      - name: 强制重置为上游版本
        run: git reset --hard upstream/gh-pages

      - name: 推送到自己的仓库
        run: git push origin gh-pages --force
